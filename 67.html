    // 畫布維度
    const width = 1200;
    const height = 750;

    // 自訂溫和、高質感的調色盤
    const colorScale = d3.scaleOrdinal()
        .domain(["歐洲", "其他亞洲地區", "北美洲", "大陸地區", "大洋洲", "中美洲", "南美洲", "非洲"])
        .range(["#4e79a7", "#59a14f", "#e15759", "#edc948", "#b07aa1", "#ff9da7", "#9c755f", "#bab0ac"]);

    // 建立圖例
    const legendContainer = d3.select("#legend-container");
    colorScale.domain().forEach(region => {
        const item = legendContainer.append("div").attr("class", "legend-item");
        item.append("div")
            .attr("class", "legend-color")
            .style("background-color", colorScale(region));
        item.append("span").text(region);
    });

    // 初始化 D3 數據根節點
    let root = d3.hierarchy(rawTreeData)
        .sum(d => d.value)
        .sort((a, b) => b.value - a.value);

    // 建立 SVG 容器
    const svg = d3.select("#chart")
        .append("svg")
        .attr("viewBox", [0, 0, width, height])
        .style("width", "100%")
        .style("height", "auto");

    // 定義 Treemap 佈局
    const treemapLayout = d3.treemap()
        .size([width, height])
        .paddingOuter(4)
        .paddingTop(24)
        .paddingInner(2)
        .round(true);

    // 獲取 Tooltip 元素
    const tooltip = d3.select("#tooltip");
    const wrapper = document.getElementById("chart-wrapper");

    // 渲染函數
    function renderTreemap() {
        treemapLayout(root);

        // 綁定資料
        const nodes = svg.selectAll("g")
            .data(root.leaves(), d => d.data.name + "-" + (d.parent ? d.parent.data.name : ""));

        // 處理新進入的節點
        const nodesEnter = nodes.enter()
            .append("g")
            .attr("transform", d => `translate(${d.x0},${d.y0})`);

        nodesEnter.append("rect")
            .attr("class", "node-rect")
            .attr("fill", d => {
                let p = d;
                while (p.depth > 1) p = p.parent;
                return colorScale(p.data.name) || "#ccc";
            })
            .attr("fill-opacity", 0.75)
            .attr("width", d => Math.max(0, d.x1 - d.x0))
            .attr("height", d => Math.max(0, d.y1 - d.y0))
            .on("mouseover", showTooltip)
            .on("mousemove", moveTooltip)
            .on("mouseout", hideTooltip);

        nodesEnter.append("text")
            .attr("class", "node-label")
            .attr("x", 5)
            .attr("y", 15);

        nodesEnter.append("text")
            .attr("class", "node-value")
            .attr("x", 5)
            .attr("y", 28);

        // 更新現有及新入節點
        const nodesMerge = nodesEnter.merge(nodes);

        nodesMerge.transition().duration(750)
            .attr("transform", d => `translate(${d.x0},${d.y0})`);

        nodesMerge.select("rect")
            .transition().duration(750)
            .attr("width", d => Math.max(0, d.x1 - d.x0))
            .attr("height", d => Math.max(0, d.y1 - d.y0));

        // 智慧型文字隱藏：方塊不夠大就不顯示文字，避免擠成一團
        nodesMerge.select(".node-label")
            .text(d => (d.x1 - d.x0 > 65 && d.y1 - d.y0 > 30) ? d.data.name : "")
            .style("font-weight", "600");

        nodesMerge.select(".node-value")
            .text(d => (d.x1 - d.x0 > 65 && d.y1 - d.y0 > 30) ? `${d.value} 人` : "");

        // 移除不需要的節點
        nodes.exit().remove();
    }

    // 滑鼠互動相關函數
    function showTooltip(event, d) {
        const ancestors = d.ancestors().reverse();
        const region = ancestors[1] ? ancestors[1].data.name : "";
        const country = ancestors[2] ? ancestors[2].data.name : "";
        const school = d.data.name;

        tooltip.style("display", "block").html(`
            <div class="tooltip-title">${school}</div>
            <div class="tooltip-row"><span>地理區域:</span> <span>${region}</span></div>
            <div class="tooltip-row"><span>目標國家/地區:</span> <span>${country}</span></div>
            <div class="tooltip-row" style="margin-top:5px; padding-top:5px; border-top:1px dashed #eee;">
                <span><strong>本次篩選值:</strong></span> 
                <span class="tooltip-value">${d.value} 人</span>
            </div>
            <div class="tooltip-row" style="font-size:11px; color:#666;">
                <span>└ 1學期以上:</span> <span>${d.data.detail_long} 人</span>
            </div>
            <div class="tooltip-row" style="font-size:11px; color:#666;">
                <span>└ 未滿1學期:</span> <span>${d.data.detail_short} 人</span>
            </div>
        `);
    }

    // 計算相對圖表容器的位置，避免 tooltip 溢出網頁邊界
    function moveTooltip(event) {
        const rect = wrapper.getBoundingClientRect();
        const x = event.clientX - rect.left + 15;
        const y = event.clientY - rect.top + 15;
        tooltip.style("left", x + "px").style("top", y + "px");
    }

    function hideTooltip() {
        tooltip.style("display", "none");
    }

    // 切換指標的流暢動畫更新
    function updateMetric(metricKey, event) {
        // 更新按鈕樣式
        d3.selectAll(".btn").classed("active", false);
        event.target.classList.add("active");

        // 重新計算權重
        root.sum(d => {
            if (metricKey === 'value') return d.value;
            if (metricKey === 'detail_long') return d.detail_long;
            if (metricKey === 'detail_short') return d.detail_short;
            return d.value;
        });
        
        root.sort((a, b) => b.value - a.value);
        renderTreemap();
    }

    // 初次執行渲染
    renderTreemap();
